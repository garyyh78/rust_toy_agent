[package]
name = "rust_toy_agent"
version = "0.1.0"
edition = "2021"

[lib]
name = "rust_toy_agent"
path = "src/lib.rs"

[[bin]]
name = "s03_todo_write"
path = "src/s03_todo_write.rs"

[dependencies]
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
dotenvy = "0.15"
uuid = { version = "1", features = ["v4"] }
