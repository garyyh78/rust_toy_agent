---
name: Bug Report
about: Create a report to help us improve
labels: bug
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to create a bug report!
  - type: input
    attributes:
      label: Rust Version
      description: Run `rustc --version` to get this
      placeholder: rustc 1.75.0
    validations:
      required: true
  - type: textarea
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Expected behavior
      description: What you expected to happen.
  - type: textarea
    attributes:
      label: Actual behavior
      description: What actually happened instead.
  - type: input
    attributes:
      label: Environment
      description: OS, shell, etc.
      placeholder: macOS 14, zsh
  - type: textarea
    attributes:
      label: Logs
      description: Relevant log output (if any).