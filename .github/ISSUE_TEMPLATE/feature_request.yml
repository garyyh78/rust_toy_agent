---
name: Feature Request
about: Suggest a new feature or improvement
labels: enhancement
assignees: ''

body:
  - type: markdown
    attributes:
      value: |
        Thanks for your feature suggestion!
  - type: textarea
    attributes:
      label: Summary
      description: A brief summary of the feature.
    validations:
      required: true
  - type: textarea
    attributes:
      label: Motivation
      description: Why is this useful? What problem does it solve?
    validations:
      required: true
  - type: textarea
    attributes:
      label: Proposed solution
      description: How should it work?
  - type: textarea
    attributes:
      label: Alternatives
      description: Other approaches you considered.