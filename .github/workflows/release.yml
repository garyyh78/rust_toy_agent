name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package binary
        shell: bash
        run: |
          BINARY_NAME="rust_toy_agent"
          ARCH="$(echo ${{ matrix.target }} | cut -d'-' -f1)"
          OS="$(echo ${{ matrix.target }} | cut -d'-' -f2)"
          if [ "$OS" = "unknown-linux-gnu" ]; then
            TAR_NAME="${BINARY_NAME}-${ARCH}-linux.tar.gz"
          else
            TAR_NAME="${BINARY_NAME}-${ARCH}-apple-darwin.tar.gz"
          fi
          mkdir -p release
          cp "target/${{ matrix.target }}/release/$BINARY_NAME" "release/$BINARY_NAME"
          tar -czvf "$TAR_NAME" -C release "$BINARY_NAME"
          echo "TAR_NAME=$TAR_NAME" >> $GITHUB_OUTPUT

      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ secrets.UPLOAD_URL }}
          asset_path: ${{ env.TAR_NAME }}
          asset_name: ${{ env.TAR_NAME }}
          asset_content_type: application/gzip
        env:
          TAR_NAME: ${{ steps.build-release.outputs.TAR_NAME }}
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}

  build-checksum:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Generate checksums
        shell: bash
        run: |
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt
      - uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ secrets.UPLOAD_URL }}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain

  publish-gh-release:
    runs-on: ubuntu-latest
    needs: [build-release, build-checksum]
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.tar.gz
            checksums.txt
          generate_release_notes: true